seed: 42
output_dir: outputs/btl2/demo_dataset
image_width: 960
image_height: 540
num_frames: 20
train_split: 0.8
preview_every: 5
save_depth_npy: true
instance_segmentation: true
camera:
  fov_y_degrees: 54.0
  near: 0.1
  far: 120.0
  base_height: 1.55
  base_pitch_degrees: -2.0
  height_jitter: 0.08
  pitch_jitter_degrees: 1.0
  yaw_jitter_degrees: 1.5
scene:
  road_length: 60.0
  road_width: 8.0
  lane_width: 3.6
  lane_count: 2
  sky_top_color: [0.45, 0.65, 0.95]
  sky_bottom_color: [0.85, 0.90, 1.0]
  # Demo profile using currently available real assets.
  min_objects: 4
  max_objects: 8
  classes:
    person:
      min_count: 0
      max_count: 0
      scale_range: [0.85, 1.1]
    car:
      min_count: 2
      max_count: 4
      scale_range: [0.9, 1.15]
    bus:
      min_count: 1
      max_count: 2
      scale_range: [0.9, 1.1]
    truck:
      min_count: 2
      max_count: 4
      scale_range: [0.9, 1.1]
    motorbike:
      min_count: 1
      max_count: 2
      scale_range: [0.85, 1.2]
    traffic_light:
      min_count: 0
      max_count: 0
      scale_range: [0.95, 1.1]
    traffic_sign:
      min_count: 0
      max_count: 0
      scale_range: [0.9, 1.2]
lighting:
  ambient_strength: 0.5
  directional_intensity_range: [1.05, 1.35]
  directional_pitch_range: [-65.0, -25.0]
  directional_yaw_range: [-30.0, 30.0]
annotations:
  min_bbox_pixels: 4
  visibility_threshold: 0.0005
  segmentation_alpha_preview: 0.45
