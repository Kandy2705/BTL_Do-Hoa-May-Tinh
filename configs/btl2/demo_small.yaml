seed: 7
output_dir: outputs/btl2/demo_dataset
image_width: 640
image_height: 360
num_frames: 20
train_split: 0.8
preview_every: 4
save_depth_npy: false
instance_segmentation: true
camera:
  fov_y_degrees: 56.0
  near: 0.1
  far: 100.0
  base_height: 1.5
  base_pitch_degrees: -2.5
  height_jitter: 0.05
  pitch_jitter_degrees: 0.8
  yaw_jitter_degrees: 1.0
scene:
  road_length: 45.0
  road_width: 8.0
  lane_width: 3.6
  lane_count: 2
  sky_top_color: [0.55, 0.7, 0.95]
  sky_bottom_color: [0.95, 0.98, 1.0]
  # Demo profile using currently available real assets.
  min_objects: 4
  max_objects: 8
  classes:
    person:
      min_count: 0
      max_count: 0
      scale_range: [0.9, 1.05]
    car:
      min_count: 2
      max_count: 3
      scale_range: [0.9, 1.1]
    bus:
      min_count: 1
      max_count: 1
      scale_range: [0.9, 1.05]
    truck:
      min_count: 2
      max_count: 3
      scale_range: [0.9, 1.05]
    motorbike:
      min_count: 1
      max_count: 1
      scale_range: [0.9, 1.1]
    traffic_light:
      min_count: 0
      max_count: 0
      scale_range: [1.0, 1.0]
    traffic_sign:
      min_count: 0
      max_count: 0
      scale_range: [0.95, 1.1]
lighting:
  ambient_strength: 0.4
  directional_intensity_range: [0.9, 1.25]
  directional_pitch_range: [-55.0, -30.0]
  directional_yaw_range: [-20.0, 20.0]
annotations:
  min_bbox_pixels: 8
  visibility_threshold: 0.02
  segmentation_alpha_preview: 0.45
