seed: 77
output_dir: outputs/btl2/showcase_finetune_dataset
image_width: 1280
image_height: 720
num_frames: 180
train_split: 0.85
preview_every: 12
save_depth_npy: true
instance_segmentation: true
camera:
  fov_y_degrees: 42.0
  near: 0.1
  far: 140.0
  base_height: 1.72
  base_pitch_degrees: -3.4
  height_jitter: 0.12
  pitch_jitter_degrees: 1.4
  yaw_jitter_degrees: 2.0
scene:
  showcase_layout: true
  showcase_position_jitter_x: 0.9
  showcase_position_jitter_z: 2.0
  showcase_yaw_jitter_degrees: 7.0
  road_length: 72.0
  road_width: 14.0
  lane_width: 4.2
  lane_count: 3
  spawn_max_attempts: 24
  spawn_min_separation: 0.55
  sky_top_color: [0.48, 0.69, 0.96]
  sky_bottom_color: [0.95, 0.98, 1.0]
  min_objects: 7
  max_objects: 7
  classes:
    person:
      min_count: 1
      max_count: 1
      scale_range: [0.92, 1.06]
    car:
      min_count: 1
      max_count: 1
      scale_range: [0.90, 1.08]
    bus:
      min_count: 1
      max_count: 1
      scale_range: [0.92, 1.08]
    truck:
      min_count: 1
      max_count: 1
      scale_range: [0.92, 1.08]
    motorbike:
      min_count: 1
      max_count: 1
      scale_range: [0.90, 1.10]
    traffic_light:
      min_count: 1
      max_count: 1
      scale_range: [0.96, 1.04]
    traffic_sign:
      min_count: 1
      max_count: 1
      scale_range: [0.96, 1.04]
lighting:
  ambient_strength: 0.52
  directional_intensity_range: [1.0, 1.2]
  directional_pitch_range: [-48.0, -30.0]
  directional_yaw_range: [-10.0, 20.0]
annotations:
  min_bbox_pixels: 4
  visibility_threshold: 0.0005
  segmentation_alpha_preview: 0.45
  coco_segmentation_mode: polygon

validation:
  enabled: true
  auto_fix: true
  require_depth: true
  require_depth_npy: true
  require_coco: true
  require_mask_pixels: true
